<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhumik | Cyber Security Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;600&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#818cf8; --accent-rgb:129,140,248; --bg:#09090b; --fg:#f8fafc; --text-muted:#94a3b8; }
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;overflow-x:hidden;}
        .container{max-width:1300px;margin:0 auto;padding:0 5vw;}
        .section-padding{padding:120px 0;}
        .mono{font-family:'Fira Code',monospace;}
        .nav-link{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;text-transform:uppercase;transition:color .2s;cursor:pointer;}
        .nav-link:hover,.nav-link.active{color:var(--accent);}
        .badge{display:inline-block;padding:6px 14px;border-radius:20px;background:rgba(var(--accent-rgb),.1);border:1px solid rgba(var(--accent-rgb),.2);color:var(--accent);font-size:12px;font-weight:600;}
        ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:rgba(var(--accent-rgb),.5);border-radius:3px;}
        .glass-card{background:rgba(15,15,20,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:60px 40px;box-shadow:0 8px 32px rgba(0,0,0,.3);margin-bottom:40px;}

        @keyframes rise{0%{bottom:-60px;opacity:0;transform:translateX(0)scale(.75)}8%{opacity:1}45%{opacity:1}75%{opacity:.6}100%{bottom:110%;opacity:0;transform:translateX(var(--dx))scale(1.05)}}
        .field{position:relative;overflow:hidden;height:440px;border-radius:18px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.05);margin-top:40px;}
        .bubble{position:absolute;display:inline-flex;align-items:center;gap:8px;padding:0 16px;height:40px;border-radius:40px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap;user-select:none;pointer-events:none;border:1px solid rgba(129,140,248,.28);background:rgba(129,140,248,.07);color:#c7d2fe;animation:rise var(--dur) var(--del) ease-in-out infinite;--dx:0px;}
        .bubble img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}

        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes floatY{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

        /* PROJECT SCROLL */
        .proj-outer{position:relative;height:400vh;z-index:5;}
        .proj-sticky{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
        .proj-stage{position:relative;width:100%;max-width:1100px;flex:1;max-height:500px;}
        .proj-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 5vw;transition:transform .7s cubic-bezier(.76,0,.24,1),opacity .55s ease;will-change:transform,opacity;}
        .proj-slide[data-s="r"]{transform:translateX(110%);opacity:0;}
        .proj-slide[data-s="a"]{transform:translateX(0);opacity:1;}
        .proj-slide[data-s="l"]{transform:translateX(-110%);opacity:0;}
        
        .dot{height:8px;border-radius:99px;border:1px solid rgba(56,189,248,.45);transition:width .4s,background .4s;cursor:pointer;}
        .dot.on{width:28px;background:#38bdf8;} .dot.off{width:8px;background:rgba(56,189,248,.2);}
        .arr{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#f8fafc;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,opacity .2s;}
        .arr:disabled{opacity:.3;cursor:not-allowed;} .arr:not(:disabled):hover{background:rgba(255,255,255,.12);}

        @media(max-width:768px){
            .glass-card{padding:40px 20px;}
            .proj-inner{grid-template-columns:1fr!important;}
            .proj-body{padding:28px 20px!important;}
            .ach-grid{grid-template-columns:repeat(2,1fr)!important;}
            .cert-row1{grid-template-columns:1fr!important;}
            .cert-row2{grid-template-columns:1fr!important; max-width:100%!important;}
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { motion, useScroll, useTransform } = Motion;

    function Cursor() {
        const [p,setP]=useState({x:-100,y:-100});
        useEffect(()=>{ const f=e=>setP({x:e.clientX,y:e.clientY}); window.addEventListener("mousemove",f); return()=>window.removeEventListener("mousemove",f); },[]);
        return <div style={{position:"fixed",top:p.y-12,left:p.x-12,width:24,height:24,borderRadius:"50%",background:"rgba(129,140,248,.2)",pointerEvents:"none",zIndex:9999,backdropFilter:"blur(2px)",border:"1px solid rgba(129,140,248,.4)"}} />;
    }

    function Typewriter({words}) {
        const [i,si]=useState(0);const [s,ss]=useState(0);const [d,sd]=useState(false);
        useEffect(()=>{
            const t=setTimeout(()=>{
                const w=words[i];
                if(!d&&s===w.length){sd(true);return;}
                if(d){if(s===0){sd(false);si((i+1)%words.length);}else ss(x=>x-1);}
                else ss(x=>x+1);
            },d?40:(s===words[i].length?1500:80));
            return()=>clearTimeout(t);
        },[i,s,d,words]);
        return <span className="mono">{words[i].slice(0,s)}<span style={{borderRight:"2px solid #818cf8",animation:"blink 1s step-end infinite"}}/></span>;
    }

    function BubbleField() {
        const r=useRef(null);
        const sk=[
            {n:'Python',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg',c:''},
            {n:'AWS',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original.svg',c:''},
            {n:'Docker',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg',c:''},
            {n:'Linux',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg',c:''},
            {n:'MySQL',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg',c:''},
            {n:'Java',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg',c:'g'},
            {n:'Git',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg',c:'g'},
            {n:'Bash',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/bash/bash-original.svg',c:'g'},
            {n:'CI/CD',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg',c:'p'},
            {n:'Node.js',l:'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nodejs/nodejs-original.svg',c:'o'},
        ];
        useEffect(()=>{
            const f=r.current; if(!f) return;
            const W=f.offsetWidth||900; const LANES=9; const lW=W/LANES;
            f.innerHTML='';
            sk.forEach((s,i)=>{
                const lx=((i%LANES)*lW)+Math.random()*(lW-80);
                const drift=(Math.random()-.5)*50; const dur=10+Math.random()*8; const del=(i/sk.length)*dur;
                const b=document.createElement('div');
                b.className='bubble'+(s.c?' '+s.c:'');
                b.style.cssText=`left:${lx}px;--dx:${drift}px;--dur:${dur}s;--del:-${del}s;animation-delay:-${del}s;`;
                const img=document.createElement('img'); img.src=s.l; img.alt=s.n; b.appendChild(img);
                b.appendChild(document.createTextNode(s.n)); f.appendChild(b);
            });
        },[]);
        return <div className="field" ref={r}></div>;
    }

    function ProjectCard({project,index}) {
        return (
            <div style={{width:"100%",maxWidth:1000,background:"rgba(10,13,20,.97)",backdropFilter:"blur(24px)",border:"1px solid rgba(129,140,248,.22)",borderRadius:24,overflow:"hidden",display:"grid",gridTemplateColumns:"1fr 1.3fr",boxShadow:"0 24px 64px rgba(0,0,0,.6)",minHeight:400}} className="proj-inner">
                <div style={{position:"relative",overflow:"hidden",minHeight:300}}>
                    <img src={project.img} alt={project.title} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
                    <div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,transparent 50%,rgba(10,13,20,.92))"}} />
                    <div style={{position:"absolute",bottom:18,left:18}}>
                        <span className="mono" style={{fontSize:10,letterSpacing:4,color:"#38bdf8",background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.28)",padding:"5px 12px",borderRadius:20}}>MODULE_0{index+1}</span>
                    </div>
                </div>
                <div style={{padding:"44px 40px",display:"flex",flexDirection:"column",justifyContent:"center"}} className="proj-body">
                    <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:"28px",fontWeight:800,color:"#f1f5f9",lineHeight:1.2,marginBottom:12}}>{project.title}</h3>
                    <p style={{color:"#94a3b8",fontSize:14,lineHeight:1.8,marginBottom:22}}>{project.desc}</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:28}}>
                        {project.tags.map(t=><span key={t} style={{padding:"4px 12px",borderRadius:99,background:"rgba(56,189,248,.09)",border:"1px solid rgba(56,189,248,.22)",color:"#38bdf8",fontSize:11,fontFamily:"'Space Mono',monospace"}}>{t}</span>)}
                    </div>
                    <div style={{display:"flex",gap:12}}>
                        <a href={project.link} target="_blank" style={{padding:"11px 22px",background:"#f8fafc",color:"#09090b",fontWeight:700,borderRadius:10,textDecoration:"none",fontSize:12,fontFamily:"'Space Mono',monospace"}}>Codebase</a>
                        <a href={project.link} target="_blank" style={{padding:"11px 22px",border:"1px solid rgba(255,255,255,.18)",color:"#f8fafc",fontWeight:700,borderRadius:10,textDecoration:"none",fontSize:12,fontFamily:"'Space Mono',monospace"}}>Live Stage</a>
                    </div>
                </div>
            </div>
        );
    }

    function ProjectsSection({projects}) {
        const outerRef = useRef(null);
        const [active, setActive] = useState(0);
        const activeRef = useRef(0);

        useEffect(()=>{
            const onScroll = () => {
                const el = outerRef.current; if(!el) return;
                const rect = el.getBoundingClientRect();
                const totalScroll = el.offsetHeight - window.innerHeight;
                if(totalScroll<=0) return;
                const scrolled = -rect.top;
                const progress = Math.max(0, Math.min(1, scrolled / totalScroll));
                const idx = Math.min(projects.length-1, Math.floor(progress * projects.length));
                if(idx !== activeRef.current){ activeRef.current=idx; setActive(idx); }
            };
            window.addEventListener("scroll", onScroll, {passive:true});
            onScroll(); return ()=>window.removeEventListener("scroll", onScroll);
        },[projects.length]);

        const goTo = (i)=>{
            const el=outerRef.current; if(!el) return;
            const totalScroll=el.offsetHeight-window.innerHeight;
            const target=el.offsetTop + ((i+0.5)/projects.length)*totalScroll;
            window.scrollTo({top:target,behavior:"smooth"});
        };

        return (
            <div id="projects" ref={outerRef} className="proj-outer">
                <div className="proj-sticky">
                    <div style={{textAlign:"center",marginBottom:22,zIndex:2,paddingTop:70}}>
                        <div className="mono badge" style={{marginBottom:12}}>// PROJECTS</div>
                        <h2 style={{fontSize:44,fontWeight:800,fontFamily:"Syne"}}>Engineering Showcases</h2>
                        <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:14}}>
                            {projects.map((_,i)=><div key={i} className={`dot ${i===active?"on":"off"}`} onClick={()=>goTo(i)} />)}
                        </div>
                    </div>
                    <div className="proj-stage">
                        {projects.map((p,i)=>(
                            <div key={i} className="proj-slide" data-s={i===active?"a":i>active?"r":"l"}>
                                <ProjectCard project={p} index={i} />
                            </div>
                        ))}
                    </div>
                    <div style={{display:"flex",gap:14,marginTop:16,alignItems:"center",zIndex:10}}>
                        <button className="arr" disabled={active===0} onClick={()=>goTo(active-1)}>←</button>
                        <span style={{color:"#64748b",fontFamily:"Space Mono",fontSize:13}}>{active+1} / {projects.length}</span>
                        <button className="arr" disabled={active===projects.length-1} onClick={()=>goTo(active+1)}>→</button>
                    </div>
                </div>
            </div>
        );
    }

    function CertCard({c}) {
        return (
            <div style={{padding:28,borderRadius:20,border:"1px solid rgba(255,255,255,.08)",background:"rgba(255,255,255,.02)",display:"flex",flexDirection:"column",textAlign:"center",alignItems:"center",height:"100%"}}>
                <h3 style={{fontSize:16,fontWeight:700,marginBottom:8,color:"#f8fafc"}}>{c.title}</h3>
                <div className="mono" style={{color:"#38bdf8",fontSize:12,marginBottom:12}}>{c.org}</div>
                <p style={{color:"#94a3b8",fontSize:13,lineHeight:1.6,marginBottom:20,flex:1}}>{c.desc}</p>
                <a href={c.link} target="_blank" style={{color:"#38bdf8",fontSize:13,textDecoration:"none",fontWeight:700,fontFamily:"Space Mono"}}>Verify →</a>
            </div>
        );
    }

    function ContactForm() {
        const [status,setStatus]=useState("idle");
        const handleSubmit=async(e)=>{
            e.preventDefault(); setStatus("sending");
            const fd=new FormData(e.target);
            try {
                const res=await fetch("https://api.web3forms.com/submit",{
                    method:"POST",
                    body:fd
                });
                const json = await res.json();
                if(json.success){ setStatus("success"); e.target.reset(); }
                else { setStatus("error"); alert("Form Error: " + (json.message || "Domain blocked or invalid key.")); }
            } catch(err){ setStatus("error"); alert("Submission failed. Check network."); }
        };
        const L={idle:"Send Message",sending:"Sending…",success:"Message Sent ✓",error:"Error — Try Again"};
        const B={idle:"#f8fafc",sending:"#64748b",success:"#22c55e",error:"#ef4444"};
        return (
            <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:16,maxWidth:600,margin:"0 auto 48px"}}>
                <input type="hidden" name="access_key" value="c49c3a92-9a06-45d5-8170-4a89c29309bd"/>
                <input type="hidden" name="subject" value="Portfolio Message - bhumik12.github.io/bhumik-portfolio"/>
                <input name="name" type="text" placeholder="Your Name" required style={{padding:18,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",outline:"none",width:"100%",fontSize:15}}/>
                <input name="email" type="email" placeholder="Your Email" required style={{padding:18,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",outline:"none",width:"100%",fontSize:15}}/>
                <textarea name="message" rows="5" placeholder="Your Message" required style={{padding:18,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",outline:"none",resize:"none",width:"100%",fontSize:15}}></textarea>
                <button type="submit" disabled={status==="sending"||status==="success"}
                    style={{padding:18,background:B[status],color:status==="idle"?"#09090b":"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .3s",width:"100%"}}>
                    {L[status]}
                </button>
            </form>
        );
    }

    const SECTIONS=["home","about","education","skills","projects","achievements","certifications","contact"];

    function Portfolio() {
        const [nav,setNav]=useState("home");
        const {scrollY}=useScroll();
        const navBg=useTransform(scrollY,[0,50],["rgba(9,9,11,0)","rgba(9,9,11,.95)"]);

        useEffect(()=>{
            const obs=new IntersectionObserver(e=>e.forEach(en=>{if(en.isIntersecting)setNav(en.target.id);}),{threshold:.3});
            SECTIONS.forEach(s=>{const el=document.getElementById(s);if(el)obs.observe(el);});
            return()=>obs.disconnect();
        },[]);

        useEffect(()=>{
            let v; if(window.VANTA?.NET) v=window.VANTA.NET({el:"#vanta-bg",mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x818cf8,backgroundColor:0x09090b,points:12,maxDistance:22,spacing:20,showDots:true});
            return()=>{if(v)v.destroy();};
        },[]);

        const edus=[
            {title:"B.Tech in Computer Science & Engineering",inst:"Lovely Professional University",location:"Phagwara, Punjab",date:"August 2025 – Present",res:"Current CGPA: 5.65",desc:"Computer Architecture, Cybersecurity, and Algorithmic Design."},
            {title:"Senior Secondary (Intermediate)",inst:"Kerala Public School",location:"Rewari, Haryana",date:"March 2021 – May 2022",res:"Score: 70%",desc:"Specialised in PCM curriculum."},
            {title:"Secondary (Matriculation)",inst:"Kerala Public School",location:"Rewari, Haryana",date:"March 2019 – May 2020",res:"Score: 80%",desc:"General secondary curriculum with distinction."}
        ];

        const projects=[
            {title:"Password Strength Analytics",desc:"Cryptographic entropy diagnostics tool powered by Python and heuristic detection.",tags:["Python","Security","Entropy"],link:"https://github.com/bhumik12/password-strength-checker-main",img:"password_checker.png"},
            {title:"Mini Projects Collection",desc:"Offensive security implementations and network reconnaissance auditing tools.",tags:["Cyber Security","Python","Ethical Hacking"],link:"https://github.com/bhumik12/Cybersecurity-Mini-Projects-main",img:"keylogger.png"},
            {title:"AWS Infrastructure Orchestration",desc:"Multi-tier VPC deployment using Terraform for secure cloud gateway routing.",tags:["AWS","Terraform","DevOps"],link:"https://github.com/bhumik12/aws-infra",img:"aws_infra.png"},
            {title:"Network Traffic Analyzer",desc:"Real-time packet inspection engine built with Scapy for traffic anomaly detection.",tags:["Python","Networking","IDS"],link:"https://github.com/bhumik12/traffic-analyzer",img:"network_analyzer.png"}
        ];

        return (
            <div>
                <Cursor/>
                <div id="vanta-bg" style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:-1}}>
                    <div style={{position:"absolute",inset:0,background:"rgba(9,9,11,.6)",zIndex:1}}/>
                </div>

                <motion.nav style={{position:"fixed",top:0,left:0,right:0,height:70,zIndex:100,background:navBg,backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,.05)",display:"flex",alignItems:"center"}}>
                    <div className="container" style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}}>
                        <div className="mono" style={{fontSize:16,fontWeight:700}}>&gt; bhumik<span style={{color:"#38bdf8"}}>.dev</span></div>
                        <div style={{display:"flex",gap:24}}>
                            {SECTIONS.map(s=><a key={s} href={`#${s}`} className={`nav-link ${nav===s?"active":""}`}>{s}</a>)}
                        </div>
                    </div>
                </motion.nav>

                <section id="home" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                    <div className="container" style={{textAlign:"center",zIndex:2}}>
                        <motion.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{duration:.8}}>
                            <div className="badge mono" style={{marginBottom:24}}>System Status: 100% UPDATED</div>
                            <h1 style={{fontSize:"clamp(38px,7vw,72px)",fontWeight:800,lineHeight:1.1,marginBottom:24,fontFamily:"Syne"}}>
                                Bhumik<br/><span style={{color:"transparent",WebkitTextStroke:"1px #38bdf8"}}>Cyber Security Specialist</span>
                            </h1>
                            <p style={{fontSize:20,color:"#94a3b8",marginBottom:48,minHeight:30}}>
                                <Typewriter words={["Securing digital infrastructures.","Analyzing system vulnerabilities.","Developing Python tools."]}/>
                            </p>
                            <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",marginBottom:28}}>
                                <a href="#projects" style={{padding:"14px 28px",background:"#f8fafc",color:"#09090b",fontWeight:700,borderRadius:8,textDecoration:"none",fontSize:14}}>Explore Work</a>
                                {/* CV DOWNLOAD - ABSOLUTE PATH TO ROOT */}
                                <a href="cv.pdf" download="Bhumik_CV.pdf" style={{padding:"14px 28px",background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.35)",color:"#38bdf8",fontWeight:700,borderRadius:8,textDecoration:"none",fontSize:14,display:"inline-flex",alignItems:"center",gap:8}}>


                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    Download CV
                                </a>
                                <a href="#contact" style={{padding:"14px 28px",background:"transparent",border:"1px solid rgba(255,255,255,.2)",color:"#f8fafc",fontWeight:700,borderRadius:8,textDecoration:"none",fontSize:14}}>Contact Me</a>
                            </div>
